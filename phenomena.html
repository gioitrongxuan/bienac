<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienac — Hiện tượng vật lý</title>
  <meta name="description" content="Danh sách các hiện tượng vật lý và thiên nhiên kỳ ảo — cực quang, sóng biển, tinh vân, hồ quang điện, sấm sét, tia phân cực, giao thoa sóng. Nhấn để xem hiệu ứng." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/phenomena.css" />
</head>
<body>
  <!-- Nền hiệu ứng WebGL -->
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-logo"><img src="assets/logo.svg" alt="logo Bienac" /></span>
      <span class="brand-name">Bienac</span>
    </a>
    <nav class="site-nav">
      <a href="index.html#videos">Video</a>
      <a href="elements.html">Nguyên tố</a>
      <a href="phenomena.html" class="nav-active">Hiện tượng</a>
      <a href="index.html#about">Về Bienac</a>
      <a class="nav-cta" id="nav-subscribe" href="#" target="_blank" rel="noopener">Đăng ký kênh</a>
    </nav>
  </header>

  <main class="ph-page">
    <section class="section visible ph-section">
      <h1 class="section-title">Hiện tượng <span class="accent">vật lý</span></h1>
      <p class="section-sub">
        Chạm vào một hiện tượng để xem nó sống dậy ngay trên nền màn hình —
        từ cực quang, sóng biển đến hồ quang điện, sấm sét và giao thoa sóng.
      </p>

      <div class="ph-legend" id="ph-legend" aria-hidden="true"><!-- render bằng JS --></div>

      <div class="ph-grid" id="ph-grid" aria-label="Danh sách hiện tượng vật lý">
        <!-- render bằng JS -->
      </div>
    </section>
  </main>

  <!-- Thẻ báo hiện tượng đang xem -->
  <div class="ph-now" id="ph-now" role="status" aria-live="polite">
    <span class="ph-now-label">Đang xem:</span>
    <span class="ph-now-name" id="ph-now-name"></span>
  </div>

  <!-- Bảng chọn hiệu ứng nền -->
  <aside class="fx-switcher" aria-label="Chọn hiệu ứng nền">
    <button class="fx-toggle" id="fx-toggle" aria-expanded="false" title="Hiệu ứng nền">✦</button>
    <div class="fx-options collapsed" id="fx-options" role="group">
      <span class="fx-label">Hiệu ứng nền</span>
      <button data-effect="aurora" title="Phím 1">🌌 Cực quang</button>
      <button data-effect="waves"  title="Phím 2">🌊 Sóng biển</button>
      <button data-effect="nebula" title="Phím 3">✨ Tinh vân</button>
      <button data-effect="fireflies" title="Phím 4">🔆 Đom đóm</button>
    </div>
  </aside>

  <footer class="site-footer">
    <p>© <span id="year"></span> Bienac — Khoa học huyền ảo.</p>
  </footer>

  <script src="js/effects.js"></script>
  <script src="js/main.js"></script>
  <script src="js/phenomena.js"></script>
  <script src="js/bubble.js"></script>
</body>
</html>
