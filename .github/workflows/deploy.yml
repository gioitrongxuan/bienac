# =====================================================================
# CI/CD: deploy website bienac lên AWS S3
#
# Chạy khi:
#   - push lên master                → deploy bản mới nhất
#   - theo lịch (6 tiếng/lần)        → tự lấy video mới của kênh rồi deploy
#   - bấm tay (workflow_dispatch)    → deploy bất cứ lúc nào
#
# Secrets cần khai báo trong Settings → Secrets and variables → Actions:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (bắt buộc)
#   S3_BUCKET                                  (bắt buộc, vd: bienac-website)
#   AWS_REGION                                 (tùy chọn, mặc định ap-southeast-1)
#
# Variables (Settings → Secrets and variables → Actions → Variables):
#   CLOUDFRONT_DISTRIBUTION_ID                 (tùy chọn, để xóa cache CloudFront)
# =====================================================================
name: Deploy to S3

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: deploy-s3
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Lấy danh sách video mới nhất của kênh (RSS, không cần API key).
      # Nếu lỗi (YouTube chặn, mạng...) thì giữ nguyên data/videos.json cũ.
      - name: Fetch latest videos from YouTube
        continue-on-error: true
        run: node scripts/fetch-videos.mjs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      # Asset (css/js/svg): cache 1 tuần.
      # index.html + data/*.json: không cache để cập nhật có hiệu lực ngay.
      - name: Sync assets to S3
        run: |
          aws s3 sync . "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "*.sh" --exclude "*.md" --exclude ".*" \
            --exclude ".git/*" --exclude ".github/*" --exclude "scripts/*" \
            --exclude "index.html" --exclude "data/*" \
            --cache-control "public, max-age=604800"

      - name: Upload index.html and data (no-cache)
        run: |
          aws s3 cp index.html "s3://${{ secrets.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 sync data "s3://${{ secrets.S3_BUCKET }}/data" \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json; charset=utf-8"

      - name: Invalidate CloudFront (optional)
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
