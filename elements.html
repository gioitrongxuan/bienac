<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienac — Bảng tuần hoàn huyền ảo</title>
  <meta name="description" content="Bảng tuần hoàn các nguyên tố hóa học với hiệu ứng đặc trưng: ngọn lửa màu, vụ nổ kim loại kiềm, khí hiếm phát sáng, phóng xạ…" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/elements.css" />
</head>
<body>
  <!-- Nền hiệu ứng WebGL -->
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-logo"><img src="assets/logo.svg" alt="logo Bienac" /></span>
      <span class="brand-name">Bienac</span>
    </a>
    <nav class="site-nav">
      <a href="index.html#videos">Video</a>
      <a href="elements.html" class="nav-active">Nguyên tố</a>
      <a href="index.html#about">Về Bienac</a>
      <a class="nav-cta" id="nav-subscribe" href="#" target="_blank" rel="noopener">Đăng ký kênh</a>
    </nav>
  </header>

  <main class="pt-page">
    <section class="section visible pt-section">
      <h1 class="section-title">Bảng <span class="accent">tuần hoàn</span></h1>
      <p class="section-sub">
        Chạm vào một nguyên tố để xem hiệu ứng đặc trưng của nó —
        ngọn lửa màu, vụ nổ, ánh sáng khí hiếm hay tia phóng xạ.
      </p>

      <div class="pt-legend" id="pt-legend" aria-hidden="true"><!-- render bằng JS --></div>

      <div class="pt-scroll">
        <div class="pt-grid" id="pt-grid" role="grid" aria-label="Bảng tuần hoàn các nguyên tố">
          <!-- render bằng JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- Modal hiệu ứng nguyên tố -->
  <div class="el-modal" id="el-modal" role="dialog" aria-modal="true" aria-labelledby="el-name" hidden>
    <div class="el-backdrop" id="el-backdrop"></div>
    <div class="el-card">
      <button class="el-close" id="el-close" aria-label="Đóng">✕</button>
      <canvas class="el-canvas" id="el-canvas" aria-hidden="true"></canvas>
      <div class="el-info">
        <div class="el-head">
          <span class="el-symbol" id="el-symbol">?</span>
          <div>
            <h2 class="el-name" id="el-name">Nguyên tố</h2>
            <p class="el-sub"><span id="el-number"></span> · <span id="el-category"></span></p>
          </div>
        </div>
        <p class="el-desc" id="el-desc"></p>
        <button class="btn btn-ghost el-replay" id="el-replay">↻ Chạy lại hiệu ứng</button>
      </div>
    </div>
  </div>

  <!-- Bảng chọn hiệu ứng nền -->
  <aside class="fx-switcher" aria-label="Chọn hiệu ứng nền">
    <button class="fx-toggle" id="fx-toggle" aria-expanded="true" title="Hiệu ứng nền">✦</button>
    <div class="fx-options" id="fx-options" role="group">
      <span class="fx-label">Hiệu ứng nền</span>
      <button data-effect="aurora" title="Phím 1">🌌 Cực quang</button>
      <button data-effect="waves"  title="Phím 2">🌊 Sóng biển</button>
      <button data-effect="nebula" title="Phím 3">✨ Tinh vân</button>
      <button data-effect="fireflies" title="Phím 4">🔆 Đom đóm</button>
    </div>
  </aside>

  <footer class="site-footer">
    <p>© <span id="year"></span> Bienac — Khoa học huyền ảo.</p>
  </footer>

  <script src="js/effects.js"></script>
  <script src="js/main.js"></script>
  <script src="js/elements.js"></script>
  <script src="js/bubble.js"></script>
</body>
</html>
